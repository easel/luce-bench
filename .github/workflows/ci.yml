name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type-check format
        run: uv run ruff format --check src tests

      - name: Test
        run: uv run pytest tests/ -v

      - name: Build wheel + sdist
        run: uv build

      - name: Verify wheel contents include fixtures
        run: |
          uv run python -c "import zipfile; \
            wheels = [f for f in __import__('os').listdir('dist') if f.endswith('.whl')]; \
            assert wheels, 'no wheel built'; \
            zf = zipfile.ZipFile('dist/' + wheels[0]); \
            names = zf.namelist(); \
            print('\n'.join(sorted(names))); \
            assert any('ds4_eval_cases.json' in n for n in names), 'ds4 fixture missing'; \
            assert any('humaneval/cases.json' in n for n in names), 'humaneval fixture missing'"

      - name: Upload wheel artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/luce-bench
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
